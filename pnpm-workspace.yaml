  # ── Security overrides (added 2026-07-01) ─────────────────────────────────
  # Each entry pins a transitive dependency to its patched version.
  # See SECURITY.md §22 and pnpm.auditConfig.ignoreCves for findings that
  # cannot be resolved this way.
  path-to-regexp: ">=8.4.0"        # GHSA-j3q9-mxjg-w52f — DoS via express>router
  axios: ">=1.16.0"                 # multiple HIGH CVEs — via @sendgrid/mail
  form-data: ">=4.0.6"             # GHSA-hmw2-7cc7-3qxx — via @sendgrid/mail>axios
  ws: ">=8.21.0"                   # GHSA-96hv-2xvq-fx4p — via stripe-replit-sync
  vitest>picomatch: ">=4.0.4"      # CVE-2026-33671 — picomatch ReDoS in test runner (v4 branch)
  vite>picomatch: ">=4.0.4"        # CVE-2026-33671 — picomatch ReDoS in vite (v4 branch)
  vitest>vite: ">=7.3.5"           # CVE-2026-39364/39363/53571 — Vite dev-server bypasses
  fast-uri: ">=3.1.2"              # GHSA-v39h-62p7-jpjc — path traversal in orval/ajv
  protobufjs: ">=7.6.1"            # CVE-2026-48712 — DoS via posthog-js/opentelemetry chain
  linkify-it: ">=5.0.1"            # CVE-2026-48801 — ReDoS in orval/typedoc/markdown-it
