packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

allowBuilds:
  core-js: set this to true or false
  esbuild: set this to true or false
  protobufjs: set this to true or false

autoInstallPeers: false

# ── Dependency audit: acknowledge unresolvable HIGH advisories ─────────────────
#
# These advisories cannot be fixed via an override without a breaking major-
# version change or because no patched version exists in the same major.
# Each entry is reviewed and confirmed non-exploitable or non-production.
# Tracked in SECURITY.md §22.
#
# CVE-2026-33671 — picomatch ReDoS (GHSA-c2c7-rcm5-vvqj):
#   v2 branch only in artifacts/mockup-sandbox (non-production prototyping tool).
#   The v4 branch used by vitest and vite is fixed via the overrides below.
# CVE-2026-4800 — lodash _.template code injection (GHSA-r5fr-rjxr-66jc):
#   No patch exists on lodash 4.x (4.18.0 is not published); only in mockup-sandbox
#   via recharts; _.template is not called from any production code path.
# GHSA-p6gq-j5cr-w38f — nodemailer raw-option SSRF (no CVE assigned):
#   Fix requires major bump nodemailer v8→v9; raw option is not used by TrainChat
#   (only sendMail with html/text is called from src/lib/email.ts). Tracked as
#   a separate upgrade task.
auditConfig:
  ignoreCves:
    - CVE-2026-33671
    - CVE-2026-4800
    - GHSA-p6gq-j5cr-w38f

catalog:
  '@replit/vite-plugin-cartographer': ^0.5.1
  '@replit/vite-plugin-dev-banner': ^0.1.1
  '@replit/vite-plugin-runtime-error-modal': ^0.0.6
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: 4.21.0
  vite: ^7.3.5
  wouter: ^3.7.1
  zod: ^3.25.76

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@replit/*'
  - stripe-replit-sync

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver

