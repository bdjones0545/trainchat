kind = "web"
previewPath = "/"
title = "TrainChat"
version = "1.0.0"
id = "artifacts/trainchat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25530

[services.development]
run = "pnpm --filter @workspace/trainchat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trainchat", "run", "build" ]
publicDir = "artifacts/trainchat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25530"
BASE_PATH = "/"
