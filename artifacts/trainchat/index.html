    <script>
      (function () {
        function _banner(bg, text) {
          function _append() {
            var d = document.createElement("div");
            d.style.cssText =
              "position:fixed;top:0;left:0;right:0;padding:10px 14px;" +
              "background:" + bg + ";color:#fff;font-size:11px;" +
              "font-family:monospace;z-index:99999;" +
              "word-break:break-all;white-space:pre-wrap;" +
              "max-height:45vh;overflow-y:auto;";
            d.textContent = text.slice(0, 600);
            document.body.appendChild(d);
          }
          try {
            document.body ? _append() : document.addEventListener("DOMContentLoaded", _append);
          } catch (e) {}
        }
        window.addEventListener("error", function (e) {
          var msg = (e.message || "unknown error") +
            "\n" + (e.filename || "") + ":" + (e.lineno || "");
          _banner("#c0392b", "JS ERROR\n" + msg);
          try {
            fetch("/api/client-error", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                message: e.message,
                stack: (e.filename || "") + ":" + (e.lineno || ""),
                url: location.href,
                userAgent: navigator.userAgent,
              }),
            }).catch(function () {});
          } catch (ex) {}
        });
        window.addEventListener("unhandledrejection", function (e) {
          var msg = String(e.reason || "unknown rejection");
          _banner("#e67e22", "PROMISE ERROR\n" + msg.slice(0, 400));
          try {
            fetch("/api/client-error", {
              method: "POST",
              headers: { "Content-Type": "application/json" },

                message: msg,
                stack: "",
                url: location.href,
                userAgent: navigator.userAgent,
              }),
            }).catch(function () {});
          } catch (ex) {}
        });
